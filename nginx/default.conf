# NGINX Reverse Proxy and Load Balancer
# This configuration provides a lightweight production-style
# front-end for two backend containers.

log_format upstream_main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for"';

access_log /var/log/nginx/access.log upstream_main buffer=32k;
error_log /var/log/nginx/error.log warn;

upstream backend_servers {
    server backend1:8080 max_fails=3 fail_timeout=30s;
    server backend2:8080 max_fails=3 fail_timeout=30s;
}

server {
    listen 80 default_server;
    server_name _;

    client_body_timeout 10s;
    client_header_timeout 10s;
    send_timeout 10s;

    gzip on;
    gzip_types text/plain text/css application/json;
    gzip_min_length 512;

    location / {
        proxy_pass http://backend_servers;
        proxy_http_version 1.0;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection close;
        proxy_buffering off;
        proxy_connect_timeout 5s;
        proxy_send_timeout 10s;
        proxy_read_timeout 10s;
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    location /health {
        proxy_pass http://backend_servers;
        proxy_http_version 1.0;
        proxy_set_header Host $host;
        proxy_set_header Connection close;
        proxy_connect_timeout 3s;
        proxy_read_timeout 3s;
        proxy_next_upstream off;
        access_log off;
    }

    location /nginx-status {
        stub_status on;
        access_log off;
        allow 127.0.0.1;
        deny all;
    }
}
