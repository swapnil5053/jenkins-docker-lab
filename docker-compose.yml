# Shared Compose configuration for service logging and runtime hygiene.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # Backend service running the lightweight C++ HTTP node.
  backend1:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend1
    networks:
      - app-network
    environment:
      CONTAINER_NAME: backend1
      SERVICE_VERSION: "1.0"
    ports:
      - "8081:8080"
    restart: unless-stopped
    labels:
      com.example.project: "lightweight-distributed-backend"
      com.example.component: "backend"
      com.example.instance: "backend1"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  backend2:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend2
    networks:
      - app-network
    environment:
      CONTAINER_NAME: backend2
      SERVICE_VERSION: "1.0"
    ports:
      - "8082:8080"
    restart: unless-stopped
    labels:
      com.example.project: "lightweight-distributed-backend"
      com.example.component: "backend"
      com.example.instance: "backend2"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging

  # NGINX reverse proxy and load balancer for the backend cluster.
  nginx:
    image: nginx:alpine
    container_name: nginx-lb
    networks:
      - app-network
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend1:
        condition: service_healthy
      backend2:
        condition: service_healthy
    restart: unless-stopped
    labels:
      com.example.project: "lightweight-distributed-backend"
      com.example.component: "reverse-proxy"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    logging: *default-logging

networks:
  app-network:
    driver: bridge
